name: Conjur-Policy-Audit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Policy via API
        shell: powershell 
        run: |
          [System.Net.ServicePointManager]::ServerCertificateValidationCallback = {$true}
          
          # Gunakan variable agar lebih rapi
          $apiKey = '${{ secrets.CONJUR_API_KEY }}'.Trim()
          $policyPath = "policies/scm.yml"
          
          $authUri = "${{ vars.CONJUR_URL }}/authn/${{ vars.CONJUR_ACCOUNT }}/${{ vars.CONJUR_USERNAME }}/authenticate"
          $policyUri = "${{ vars.CONJUR_URL }}/policies/${{ vars.CONJUR_ACCOUNT }}/policy/root"

          # 1. Ambil Token
          Write-Host "Sedang mengautentikasi ${{ vars.CONJUR_USERNAME }}..."
          $token = Invoke-RestMethod -Method Post -Uri $authUri -Body $apiKey -ContentType "text/plain"
          
          # 2. Encode Token ke Base64
          $tokenBytes = [System.Text.Encoding]::UTF8.GetBytes($token)
          $base64Token = [Convert]::ToBase64String($tokenBytes)

          $headers = @{
              "Authorization" = "Token token=`"$base64Token`""
          }

          # 3. Kirim Policy
          Write-Host "Mengirim policy $policyPath ke Conjur..."
          $policyContent = Get-Content -Raw -Path $policyPath
          Invoke-RestMethod -Method Post -Uri $policyUri -Headers $headers -Body $policyContent -ContentType "text/plain"
          
          Write-Host "BERHASIL! Policy terupdate dan teraudit."