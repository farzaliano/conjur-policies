name: Conjur Policy Sync
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Conjur Policy Load
        uses: cyberark/conjur-action@v2
        with:
          url: ${{ secrets.CONJUR_APPLIANCE_URL }}
          account: ${{ secrets.CONJUR_ACCOUNT }}
          authn_id: ${{ secrets.CONJUR_AUTHN_LOGIN }}
          api_key: ${{ secrets.CONJUR_AUTHN_API_KEY }}
          batch_file: 'policies/bamboo.yaml'