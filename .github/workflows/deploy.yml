name:

on:
  push:
    branches:
      - main
    paths:
      - 'policies/**'

jobs:
  deploy-policies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Conjur CLI
        run: |
          wget https://github.com/cyberark/conjur-cli-go/releases/download/v8.0.12/conjur-cli-go_8.0.12_linux_amd64.tar.gz
          tar -xvzf conjur-cli-go_8.0.12_linux_amd64.tar.gz
          sudo mv conjur-cli-go_8.0.12_linux_amd64/conjur /usr/local/bin/

      - name: Configure Conjur
        run: |
          # Gunakan sertifikat conjur.pem yang ada di folder policies agar login aman
          conjur init --url "${{ secrets.CONJUR_URL }}" --account conjur --certificate-file ./policies/conjur.pem

      - name: Login to Conjur
        run: |
          conjur login --identifier "${{ secrets.CONJUR_USERNAME }}" --api-key "${{ secrets.CONJUR_API_KEY }}"

      - name: Apply All Policies (Audit Enabled)
        run: |
          # Meload semua file .yaml untuk sinkronisasi audit
          for file in policies/*.yaml; do
            if [ "$file" != "policies/conjur.pem" ]; then
              echo "Applying policy: $file"
              conjur policy replace -b root -f "$file"
            fi
          done