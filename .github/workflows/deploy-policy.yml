name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: ubuntu-latest

    env:
      CONJUR_ACCOUNT: ${{ secrets.CONJUR_ACCOUNT }}
      CONJUR_URL: ${{ secrets.CONJUR_URL }}
      CONJUR_USERNAME: ${{ secrets.CONJUR_USERNAME }}
      CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Conjur CLI
        run: |
          sudo apt update
          sudo apt install -y ruby-full
          sudo gem install conjur-cli
          sudo sed -i '2irequire "logger"' /usr/local/bin/conjur
          conjur --version

      - name: Load Policy
        run: |
          echo "Initializing Conjur CLI..."

          conjur init \
            --url "$CONJUR_URL" \
            --account "$CONJUR_ACCOUNT" \
            --force true

          echo "Logging in..."

          conjur login \
            --id "$CONJUR_USERNAME" \
            --password "$CONJUR_API_KEY"

          echo "Loading policy..."

          conjur policy load \
            -b root \
            -f policies/host-jenkins.yml

          echo "Done!"