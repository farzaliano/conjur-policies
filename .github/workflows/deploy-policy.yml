name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Conjur CLI
        run: |
          sudo apt update
          sudo apt install -y ruby-full
          sudo gem install conjur-cli
          sudo sed -i '2irequire "logger"' /usr/local/bin/conjur
          conjur --version

      - name: Authenticate & Load Policy
        env:
          CONJUR_URL: ${{ secrets.CONJUR_URL }}
          CONJUR_ACCOUNT: ${{ secrets.CONJUR_ACCOUNT }}
          CONJUR_LOGIN: ${{ secrets.CONJUR_USERNAME }}
          CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}

        run: |
          conjur init \
            --url "$CONJUR_URL" \
            --account "$CONJUR_ACCOUNT" \
            --force

          conjur login \
            --id "$CONJUR_LOGIN" \
            --password "$CONJUR_API_KEY"

          conjur policy load \
            -b root \
            -f policies/policy-branch.yml