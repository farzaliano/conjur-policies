name:

on:
  push:

jobs:
  load-policy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate & Load Policy to Conjur
        env:
          url: ${{ secrets.CONJUR_URL }}
          account: conjur
          host_id: ${{ secrets.CONJUR_USERNAME }}
          api_key: ${{ secrets.CONJUR_API_KEY }}
          run: |
            echo "Initializing Conjur CLI..."

            conjur init `
              --url $env:CONJUR_URL `
              --account $env:CONJUR_ACCOUNT `
              --ca-cert /home/runner/ca-chain-cluster.crt `
              --force

            echo "Logging in to Conjur..."

            conjur login `
              --id $env:CONJUR_LOGIN `
              --password $env:CONJUR_API_KEY