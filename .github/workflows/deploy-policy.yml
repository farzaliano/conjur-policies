name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Conjur CLI
        run: |
          run: |
          curl -fsSL https://apt.conjur.net/public.gpg | sudo gpg --dearmor -o /usr/share/keyrings/conjur.gpg

          echo "deb [signed-by=/usr/share/keyrings/conjur.gpg] https://apt.conjur.net stable main" \
            | sudo tee /etc/apt/sources.list.d/conjur.list

          sudo apt update
          sudo apt install -y conjur-cli

          conjur --version
          
      - name: Authenticate & Load Policy
        env:
          CONJUR_URL: ${{ secrets.CONJUR_URL }}
          CONJUR_ACCOUNT: ${{ secrets.CONJUR_ACCOUNT }}
          CONJUR_LOGIN: ${{ secrets.CONJUR_USERNAME }}
          CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}

        run: |
          echo "Initializing Conjur CLI.."

          conjur init \
            --url "$CONJUR_URL" \
            --account "$CONJUR_ACCOUNT" \
            --force

          echo "Logging in to Conjur..."

          conjur login \
            --id "$CONJUR_LOGIN" \
            --password "$CONJUR_API_KEY"

          echo "Loading policy..."

          conjur policy load \
            -b root \
            -f policies/policy-branch.yml

          echo "Done!"