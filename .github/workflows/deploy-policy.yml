name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Conjur CLI
        run: |
          curl -LO https://github.com/cyberark/conjur-cli-go/releases/latest/download/conjur-linux-amd64
          chmod +x conjur-linux-amd64
          sudo mv conjur-linux-amd64 /usr/local/bin/conjur

      - name: Authenticate & Load Policy
        env:
          CONJUR_URL: ${{ secrets.CONJUR_URL }}
          CONJUR_ACCOUNT: conjur
          CONJUR_LOGIN: ${{ secrets.CONJUR_USERNAME }}
          CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}

        run: |
          echo "Initializing Conjur CLI..."

          conjur init \
            --url "$CONJUR_URL" \
            --account "$CONJUR_ACCOUNT" \
            --force

          echo "Logging in to Conjur..."

          conjur login \
            --id "$CONJUR_LOGIN" \
            --password "$CONJUR_API_KEY"

          echo "Loading policy..."

          conjur policy load \
            -b root \
            -f policies/policy-branch.yml

          echo "Done!"