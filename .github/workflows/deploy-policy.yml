name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate & Load Policy
        env:
          CONJUR_URL: ${{ secrets.CONJUR_URL }}
          CONJUR_ACCOUNT: conjur
          CONJUR_LOGIN: ${{ secrets.CONJUR_USERNAME }}
          CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}

        run: |
          echo "Initializing Conjur CLI..."

          conjur init \
            --url $env:CONJUR_URL \
            --account $env:CONJUR_ACCOUNT \
            --force

          echo "Logging in to Conjur..."

          conjur login `
            --id $env:CONJUR_LOGIN `
            --password $env:CONJUR_API_KEY

          echo "Loading policy..."

          conjur policy load `
            -b root `
            -f policies/policy-branch.yml

          echo "Done!"