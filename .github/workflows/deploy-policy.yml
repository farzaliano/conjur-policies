name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Conjur CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/cyberark/conjur-cli-go/releases/latest | grep tag_name | cut -d '"' -f4)

          curl -L https://github.com/cyberark/conjur-cli-go/releases/download/$VERSION/conjur-cli-go_linux_amd64 -o conjur

          chmod +x conjur
          sudo mv conjur /usr/local/bin/conjur

          conjur --version
          
      - name: Authenticate & Load Policy
        env:
          CONJUR_URL: ${{ secrets.CONJUR_URL }}
          CONJUR_ACCOUNT: ${{ secrets.CONJUR_ACCOUNT }}
          CONJUR_LOGIN: ${{ secrets.CONJUR_USERNAME }}
          CONJUR_API_KEY: ${{ secrets.CONJUR_API_KEY }}

        run: |
          echo "Initializing Conjur CLI.."

          conjur init \
            --url "$CONJUR_URL" \
            --account "$CONJUR_ACCOUNT" \
            --force

          echo "Logging in to Conjur..."

          conjur login \
            --id "$CONJUR_LOGIN" \
            --password "$CONJUR_API_KEY"

          echo "Loading policy..."

          conjur policy load \
            -b root \
            -f policies/policy-branch.yml

          echo "Done!"