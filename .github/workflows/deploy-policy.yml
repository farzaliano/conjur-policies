name: Load Conjur Policy

on:
  push:

jobs:
  load-policy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate & Load Policy to Conjur
        env:
          CONJUR_URL: ${{ vars.CONJUR_URL }}
          CONJUR_ACCOUNT: ${{ vars.CONJUR_ACCOUNT }}
          CONJUR_USERNAME: ${{ vars.CONJUR_USERNAME }}
          CONJUR_API_KEY: ${{ secrets.CONJUR_AUTHN_API_KEY }}
        run: |
          Write-Host "Initializing Conjur CLI..."
          conjur init `
            --url "$env:CONJUR_URL" `
            --account "$env:CONJUR_ACCOUNT" `
            --force true

          Write-Host "Logging in to Conjur..."
          # Pastikan menggunakan $env:CONJUR_USERNAME sesuai yang didefinisikan di 'env'
          conjur login `
            --id "$env:CONJUR_USERNAME" `
            --password "$env:CONJUR_API_KEY"

          Write-Host "Loading policy to Conjur..."
          conjur policy load `
            -b root `
            -f policies/policy-branch.yml
            
          Write-Host "Done!"